<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Pictogramas Interactivo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="text-center p-4">
        <h1>Sistema de Pictogramas Interactivo</h1>
    </header>
    <main class="container mt-4">
        <div id="category-view" class="grid-container">
            <!-- Category cards will be inserted here -->
        </div>
        <div id="pictogram-view" class="d-none">
            <button id="back-to-categories-btn" class="btn btn-secondary mb-3"><iconify-icon icon="mdi:arrow-left"></iconify-icon> Volver a Categorías</button>
            <div id="pictogram-grid" class="grid-container"></div>
        </div>
        <hr>
        <div class="d-flex justify-content-center align-items-center mb-2">
            <h2 class="text-center mb-0 me-3">Frase Actual</h2>
            <button id="read-sentence-btn" class="btn btn-primary me-2"><iconify-icon icon="mdi:volume-high"></iconify-icon> Leer Frase</button>
            <button id="clear-sentence-btn" class="btn btn-danger"><iconify-icon icon="mdi:delete-sweep"></iconify-icon> Limpiar</button>
        </div>
        <div id="sentence-bar" class="sentence-container"></div>
        <div id="suggestion-bar" class="suggestion-container mt-4">
            <h3 class="text-center mb-3">Sugerencias</h3>
            <div id="suggestion-grid" class="grid-container"></div>
        </div>
    </main>
    <footer class="text-center p-4">
        <button id="custom-mode-btn" class="btn btn-warning me-2">Añadir Pictograma</button>
        <button id="export-btn" class="btn btn-success me-2">Exportar Frase</button>
        <button id="import-btn" class="btn btn-info">Importar Frase</button>
        <input type="file" id="import-file-input" style="display: none;" accept=".json">
    </footer>
    <div id="custom-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Añadir Nuevo Pictograma</h2>
            <form id="add-pictogram-form">
                <div class="creation-block">
                    <div id="image-icon-preview" class="mb-3">
                        <iconify-icon icon="mdi:image-plus" style="font-size: 5rem; color: #ccc;"></iconify-icon>
                    </div>
                    <div class="mb-3">
                        <label for="pictogram-icon" class="form-label">Icono de Iconify</label>
                        <input type="text" class="form-control" id="pictogram-icon" placeholder="ej: mdi:car">
                    </div>
                    <div class="mb-3">
                        <label for="pictogram-image" class="form-label">O Subir Imagen</label>
                        <input type="file" class="form-control" id="pictogram-image" accept="image/*">
                    </div>
                </div>
                <div class="creation-block">
                     <div class="mb-3">
                        <label for="pictogram-text" class="form-label">Texto del Pictograma</label>
                        <input type="text" class="form-control" id="pictogram-text" placeholder="Ej: Pelota" required>
                    </div>
                    <div class="mb-3">
                        <label for="pictogram-category" class="form-label">Categoría</label>
                        <input type="text" class="form-control" id="pictogram-category" placeholder="Ej: Juguetes">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mt-3">Añadir Pictograma</button>
                </div>
            </form>
        </div>
    </div>
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <!-- Toasts will be inserted here -->
    </div>

    <!-- Delete Confirmation Modal -->
    <div class="modal fade" id="delete-confirm-modal" tabindex="-1" aria-labelledby="deleteModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="deleteModalLabel">Confirmar Eliminación</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="delete-modal-body">
                    ...
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-danger" id="confirm-delete-btn">Eliminar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <div id="variations-popup" class="card shadow-lg d-none"></div>
    <script src="pictogram-data.js"></script>
    <script src="script.js"></script>
</body>
</html>
