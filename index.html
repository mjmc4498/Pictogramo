<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Pictogramas Interactivo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Sistema de Pictogramas Interactivo</h1>
    </header>
    <main>
        <div id="pictogram-grid" class="grid-container"></div>
        <div id="sentence-bar" class="sentence-container"></div>
    </main>
    <footer>
        <button id="custom-mode-btn">Modo Personalizado</button>
    </footer>
    <div id="custom-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Añadir Nuevo Pictograma</h2>
            <form id="add-pictogram-form">
                <input type="text" id="pictogram-text" placeholder="Texto del pictograma" required>
                <input type="file" id="pictogram-image" accept="image/*" required>
                <img id="image-preview" src="#" alt="Vista previa de la imagen" style="display:none; max-width: 100px; margin-top: 10px;">
                <button type="submit">Añadir</button>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
