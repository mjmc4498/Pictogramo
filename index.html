<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Pictogramas Interactivo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-iconpicker/1.10.0/css/bootstrap-iconpicker.min.css"/>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="text-center p-4">
        <h1>Sistema de Pictogramas Interactivo</h1>
    </header>
    <main class="container mt-4">
        <div id="category-filter-bar" class="text-center mb-4"></div>
        <div id="pictogram-grid" class="grid-container"></div>
        <hr>
        <div class="d-flex justify-content-center align-items-center mb-2">
            <h2 class="text-center mb-0 me-3">Frase Actual</h2>
            <button id="read-sentence-btn" class="btn btn-primary"><i class="bi bi-volume-up"></i> Leer Frase</button>
        </div>
        <div id="sentence-bar" class="sentence-container"></div>
    </main>
    <footer class="text-center p-4">
        <button id="custom-mode-btn" class="btn btn-warning me-2">Modo Personalizado</button>
        <button id="export-btn" class="btn btn-success me-2">Exportar Frase</button>
        <button id="import-btn" class="btn btn-info">Importar Frase</button>
        <input type="file" id="import-file-input" style="display: none;" accept=".json">
    </footer>
    <div id="custom-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Añadir Nuevo Pictograma</h2>
            <form id="add-pictogram-form" class="row g-3">
                <div class="col-12">
                    <label for="pictogram-text" class="form-label">Texto del Pictograma</label>
                    <input type="text" class="form-control" id="pictogram-text" placeholder="Ej: Pelota" required>
                </div>
                <div class="col-12">
                    <label for="pictogram-category" class="form-label">Categoría</label>
                    <input type="text" class="form-control" id="pictogram-category" placeholder="Ej: Juguetes">
                </div>
                <div class="col-12">
                    <label for="pictogram-icon" class="form-label">Elegir un Icono (Opcional)</label>
                    <button type="button" id="pictogram-icon-picker" class="btn btn-outline-secondary" role="iconpicker"></button>
                    <input type="hidden" id="pictogram-icon" name="pictogram-icon">
                </div>
                <div class="col-12">
                    <label for="pictogram-image" class="form-label">O Subir una Imagen (Opcional)</label>
                    <input type="file" class="form-control" id="pictogram-image" accept="image/*">
                    <img id="image-preview" src="#" alt="Vista previa de la imagen" class="img-thumbnail mt-2" style="display:none; max-width: 100px;">
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-primary w-100">Añadir Pictograma</button>
                </div>
            </form>
        </div>
    </div>
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <!-- Toasts will be inserted here -->
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-iconpicker/1.10.0/js/bootstrap-iconpicker.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
