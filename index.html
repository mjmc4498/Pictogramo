<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Pictogramas Interactivo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="bg-primary text-white text-center p-3">
        <h1>Sistema de Pictogramas Interactivo</h1>
    </header>
    <main class="container mt-4">
        <div id="category-filter-bar" class="text-center mb-4"></div>
        <div id="pictogram-grid" class="grid-container"></div>
        <hr>
        <h2 class="text-center">Frase Actual</h2>
        <div id="sentence-bar" class="sentence-container"></div>
    </main>
    <footer class="text-center p-4">
        <button id="custom-mode-btn" class="btn btn-warning me-2">Modo Personalizado</button>
        <button id="export-btn" class="btn btn-success me-2">Exportar Frase</button>
        <button id="import-btn" class="btn btn-info">Importar Frase</button>
        <input type="file" id="import-file-input" style="display: none;" accept=".json">
    </footer>
    <div id="custom-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Añadir Nuevo Pictograma</h2>
            <form id="add-pictogram-form">
                <input type="text" id="pictogram-text" placeholder="Texto del pictograma" required>
                <input type="file" id="pictogram-image" accept="image/*" required>
                <img id="image-preview" src="#" alt="Vista previa de la imagen" style="display:none; max-width: 100px; margin-top: 10px;">
                <button type="submit">Añadir</button>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>
</html>
